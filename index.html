<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coca-Cola | Imersivno Degustiranje</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Osnovne i UI-boje */
        :root {
            --dark-ui: #111;
            --white-ui: #fff;
            --overlay-bg: rgba(0,0,0,0.95);
        }

        /* Osnovna CSS podešavanja */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: all 0.3s ease; }
        body { background-color: var(--dark-ui); color: var(--white-ui); overflow-x: hidden; }

        /* Meni sa izborom koka kola */
        .flavor-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            padding: 100px 5%;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .flavor-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
        }

        .flavor-card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        .flavor-card img { width: 120px; height: auto; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5)); }
        .flavor-card h4 { margin-top: 15px; font-size: 1rem; font-weight: 700; text-transform: uppercase; }

        /* Modalni prozor (Imersivni ekran) */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--overlay-bg);
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal.open { opacity: 1; visibility: visible; }

        .modal-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 90%; max-width: 1200px;
            margin: 5% auto;
            gap: 50px;
            align-items: center;
        }

        .modal-image-area img {
            width: 100%; max-width: 400px;
            display: block; margin: 0 auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
        }

        .modal-text-area { padding-right: 30px; }
