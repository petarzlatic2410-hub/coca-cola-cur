<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coca-Cola | Istraži Ukuse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F40009; /* Početna crvena */
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: all 0.5s ease; /* Glatki prelaz boja */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glavni kontejner */
        .explorer-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            text-align: center;
        }

        .display-area {
            max-width: 800px;
            margin-bottom: 50px;
        }

        #flavor-title {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        #flavor-desc {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Meni sa izborom koka kola */
        .flavor-selector {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .flavor-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            width: 150px;
            text-align: center;
        }

        .flavor-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
        }

        .flavor-card.active {
            border-color: white;
            background: rgba(255, 255, 255, 0.3);
        }

        .flavor-card img {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .flavor-card h4 {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        footer {
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="explorer-container">
        <div class="display-area" id="main-display">
            <h1 id="flavor-title">Classic</h1>
            <p id="flavor-desc">Originalni ukus koji je sve započeo. Osveženje koje traje od 1886. godine.</p>
        </div>

        <div class="flavor-selector">
            <div class="flavor-card active" onclick="updateFlavor('classic')">
                <img src="https://img.icons8.com/color/144/coca-cola.png" alt="Classic">
                <h4>Classic</h4>
            </div>
            <div class="flavor-card" onclick="updateFlavor('zero')">
                <img src="https://img.icons8.com/color/144/coca-cola-zero.png" alt="Zero">
                <h4>Zero Sugar</h4>
            </div>
            <div class="flavor-card" onclick="updateFlavor('cherry')">
                <img src="https://img.icons8.com/officel/160/cherry.png" alt="Cherry">
                <h4>Cherry</h4>
            </div>
            <div class="flavor-card" onclick="updateFlavor('vanilla')">
                <img src="https://img.icons8.com/color/144/ice-cream-cone.png" alt="Vanilla">
                <h4>Vanilla</h4>
            </div>
        </div>
    </div>

    <footer>
        Klikni na ikonicu da promeniš atmosferu sajta.
    </footer>

    <script>
        const data = {
            classic: {
                title: "Classic",
                desc: "Originalni ukus koji je sve započeo. Osveženje koje traje od 1886. godine.",
                color: "#F40009"
            },
            zero: {
                title: "Zero Sugar",
                desc: "Savršen spoj poznatog ukusa i nula kalorija. Za one koji ne prave kompromise.",
                color: "#1a1a1a"
            },
            cherry: {
                title: "Cherry Coke",
                desc: "Eksplozija slatke trešnje u svakom gutljaju. Omiljeni izbor za ljubitelje voćnih nota.",
                color: "#8B0000"
            },
            vanilla: {
                title: "Vanilla",
                desc: "Glatka i kremasta nota vanile koja pruža luksuzan osećaj osveženja.",
                color: "#F3E5AB"
            }
        };

        function updateFlavor(flavor) {
            const flavorInfo = data[flavor];
            
            // Promena boja i teksta
            document.documentElement.style.setProperty('--bg-color', flavorInfo.color);
            document.getElementById('flavor-title').innerText = flavorInfo.title;
            document.getElementById('flavor-desc').innerText = flavorInfo.desc;

            // Kontrola svetlog/tamnog teksta
            if (flavor === 'vanilla') {
                document.body.style.color = '#333';
            } else {
                document.body.style.color = '#fff';
            }

            // Ažuriranje aktivne kartice
            const cards = document.querySelectorAll('.flavor-card');
            cards.forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
