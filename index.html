<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McDonald's FINAL ELITE</title>

<style>
:root{--red:#d62828;--yellow:#fcbf49;--bg:#fafafa;--card:#fff;--text:#222}
body.dark{--bg:#121212;--card:#1e1e1e;--text:#eee}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}
header{background:var(--red);color:white;padding:12px;display:flex;justify-content:space-between}
button{background:var(--yellow);border:none;padding:8px;border-radius:6px;cursor:pointer}

.hero{text-align:center;padding:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:var(--card);padding:10px;border-radius:10px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:.2s}
.card:hover{transform:scale(1.08)}
.card img{width:100%;height:140px;object-fit:cover;border-radius:8px}

.cart{position:fixed;right:-350px;top:0;width:350px;height:100%;background:var(--card);transition:.3s;padding:15px}
.cart.open{right:0}

.search{text-align:center}
input{padding:8px;width:220px}

.ai-buttons{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px}
.ai-buttons button{background:#ff9f1c}

</style>
</head>
<body>

<header>
<div>🍔 ELITE MODE</div>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="toggleCart()">🛒 (<span id="count">0</span>)</button>
</div>
</header>

<div class="hero">
<h1>MAX FUNKCIJA 🔥</h1>

<div class="ai-buttons">
<button onclick="ai1()">Combo</button>
<button onclick="ai2()">Najjeftinije</button>
<button onclick="ai3()">Najskuplje</button>
<button onclick="ai4()">Random</button>
<button onclick="ai5()">Za bulk</button>
</div>
<p id="ai"></p>

</div>

<div class="search">
<input id="search" placeholder="Traži..." onkeyup="filter()">
</div>

<div class="grid" id="menu"></div>

<div class="cart" id="cart">
<button onclick="toggleCart()">❌</button>
<h2>Korpa</h2>
<div id="items"></div>
<h3 id="total"></h3>
<button onclick="checkout()">💳 Plati</button>
<button onclick="clearCart()">🗑 Clear</button>
</div>

<script>
const products=[
{name:"Big Mac",price:450,img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Cheeseburger",price:250,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pomfrit",price:200,img:"https://images.unsplash.com/photo-1576107232684-1279f390859f"},
{name:"Coca-Cola",price:180,img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13"},
{name:"Fanta",price:180,img:"https://images.unsplash.com/photo-1622483767028-3f66f32e6d1c"},
{name:"Milkshake",price:350,img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699"},
{name:"Nuggets",price:300,img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086"}
];

const menu=document.getElementById('menu');

function renderMenu(list){
menu.innerHTML='';
list.forEach(p=>{
let el=document.createElement('div');
el.className='card';
el.innerHTML=`<img src="${p.img}"><h3>${p.name}</h3><p>${p.price} RSD</p><button onclick="add('${p.name}',${p.price})">Dodaj</button>`;
menu.appendChild(el);
});
}
renderMenu(products);

let cart=[];

function add(name,price){cart.push({name,price});updateCart();}

function updateCart(){
let items=document.getElementById('items');
items.innerHTML='';
let total=0;
cart.forEach(i=>{total+=i.price;items.innerHTML+=`${i.name} - ${i.price}<br>`});
document.getElementById('total').innerText='Ukupno: '+total;
document.getElementById('count').innerText=cart.length;
}

function toggleCart(){document.getElementById('cart').classList.toggle('open')}
function toggleDark(){document.body.classList.toggle('dark')}

function checkout(){alert('Plaćeno ✅');cart=[];updateCart();}
function clearCart(){cart=[];updateCart();}

/* MULTI AI */
function ai1(){document.getElementById('ai').innerText="Big Mac + Cola"}
function ai2(){document.getElementById('ai').innerText="Pomfrit (najjeftinije)"}
function ai3(){document.getElementById('ai').innerText="Big Mac (najskuplje)"}
function ai4(){let r=products[Math.floor(Math.random()*products.length)];document.getElementById('ai').innerText=r.name}
function ai5(){document.getElementById('ai').innerText="Uzmi sve 😈"}

function filter(){
let val=document.getElementById('search').value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
renderMenu(filtered);
}

</script>

</body>
</html>
