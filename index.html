<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coca-Cola | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #F40009;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #050505; 
            color: #fff; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            min-height: 100vh;
        }

        /* --- GLAVNI EKRAN --- */
        .main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 5px; text-align: center; }

        .selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .flavor-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flavor-card:hover { transform: translateY(-15px); background: rgba(255, 255, 255, 0.15); border-color: #fff; }
        .flavor-card img { width: 100px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .flavor-card h2 { margin-top: 20px; font-size: 1.2rem; text-transform: uppercase; }

        /* --- DASHBOARD MODAL --- */
        #dashboard {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: none;
            overflow-y: auto;
            padding: 40px 5%;
        }

        .dashboard-content {
            display: grid;
            grid-template-columns: 1fr 0.8fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        @media (max-width: 1100px) { .dashboard-content { grid-template-columns: 1fr; } }

        /* Kolone */
        .col { display: flex; flex-direction: column; gap: 25px; }

        .glass-panel {
            background: var(--glass);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
        }

        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 3rem; cursor: pointer; color: #666; transition: 0.3s; }
        .close-btn:hover { color: #fff; transform: rotate(90deg); }

        /* Tipografija u dashboardu */
        .dash-title { font-size: 4rem; font-weight: 900; line-height: 1; margin-bottom: 10px; }
        .tagline { color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 20px; display: block; }
        h3 { font-size: 1.1rem; text-transform: uppercase; margin-bottom: 15px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
        p { line-height: 1.6; font-size: 0.95rem; color: #ccc; }

        /* Nutritivna Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        table td:last-child { text-align: right; font-weight: 700; }

        /* Centralna slika */
        .bottle-focus img { width: 100%; max-width: 400px; display: block; margin: 0 auto; filter: drop-shadow(0 0 50px rgba(244,0,9,0.3)); }
