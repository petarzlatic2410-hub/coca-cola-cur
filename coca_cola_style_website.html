<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coca-Cola Premium</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background:#f5f5f5;
    }

    header {
      background:#e41c2d;
      color:white;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav a {
      margin:0 10px;
      color:white;
      text-decoration:none;
      font-weight:600;
    }

    .hero {
      height:90vh;
      background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1580910051074-3eb694886505') center/cover;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
      animation: fadeIn 2s;
    }

    .hero h1 { font-size:50px; }
    .hero p { margin:15px 0; }

    button {
      background:#e41c2d;
      border:none;
      padding:12px 25px;
      color:white;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover { background:#b71525; transform:scale(1.05); }

    .section { padding:60px 20px; text-align:center; }

    .products {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .card:hover { transform:translateY(-10px); }

    .login-box {
      max-width:300px;
      margin:30px auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:5px;
      border:1px solid #ccc;
    }

    footer {
      background:#111;
      color:white;
      padding:20px;
      text-align:center;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <h2>Coca-Cola</h2>
  <nav>
    <a href="#">Početna</a>
    <a href="#products">Proizvodi</a>
    <a href="#login">Login</a>
  </nav>
</header>

<section class="hero">
  <h1>Open Happiness</h1>
  <p>Najbolje osveženje na svetu</p>
  <button onclick="alert('Poručeno!')">Kupi odmah</button>
</section>

<section id="products" class="section">
  <h2>Proizvodi</h2>
  <div class="products">
    <div class="card"><h3>Classic</h3><p>Original</p><button onclick="buy('Classic')">Kupi</button></div>
    <div class="card"><h3>Zero</h3><p>Bez šećera</p><button onclick="buy('Zero')">Kupi</button></div>
    <div class="card"><h3>Cherry</h3><p>Višnja</p><button onclick="buy('Cherry')">Kupi</button></div>
  </div>
</section>

<section id="login" class="section">
  <h2>Login</h2>
  <div class="login-box">
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</section>

<footer>
  © 2026 Coca-Cola Style
</footer>

<script>
function buy(product) {
  alert('Kupio si: ' + product);
}

function login() {
  let u = document.getElementById('user').value;
  let p = document.getElementById('pass').value;

  if(u === 'admin' && p === '1234') {
    alert('Uspešan login!');
  } else {
    alert('Pogrešan login');
  }
}
</script>

</body>
</html>
